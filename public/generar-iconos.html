const blob = new Blob([svgStr], {type: 'image/svg+xml'});
const url = URL.createObjectURL(blob);

function drawAndDownload(canvasId, size, filename) {
  return new Promise(resolve => {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    // Dark background
    ctx.fillStyle = '#07101f';
    ctx.fillRect(0, 0, size, size);
    const img = new Image();
    img.onload = () => {
      const pad = size * 0.1;
      ctx.drawImage(img, pad, pad, size - pad*2, size - pad*2);
      canvas.toBlob(pngBlob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(pngBlob);
        a.download = filename;
        a.click();
        resolve();
      });
    };
    img.src = url;
  });
}

(async () => {
  await drawAndDownload('c192', 192, 'icon-192.png');
  await new Promise(r => setTimeout(r, 500));
  await drawAndDownload('c512', 512, 'icon-512.png');
  document.getElementById('status').textContent = '✅ Listo! Se descargaron icon-192.png e icon-512.png. Subílos a la carpeta public en GitHub.';
})();
